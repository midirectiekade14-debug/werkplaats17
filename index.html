<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="siteTitle">Werkplaats17</title>
<meta name="description" id="metaDesc" content="">
<meta property="og:title" id="ogTitle" content="">
<meta property="og:description" id="ogDesc" content="">
<meta property="og:type" content="website">
<meta property="og:locale" content="nl_NL">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #161412;
    --surface: #1e1b17;
    --surface2: #252118;
    --amber: #E09A2F;
    --amber-light: #F5B040;
    --amber-glow: rgba(224, 154, 47, 0.08);
    --cream: #F0EAE0;
    --muted: #7a7060;
    --line: #2e2920;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── GRAIN ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
    opacity: 0.6;
  }

  /* ── STICKY NAV ── */
  .sticky-nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(22, 20, 18, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    padding: 0 24px;
    transform: translateY(-100%);
    transition: transform 0.3s ease;
  }
  .sticky-nav.visible { transform: translateY(0); }
  .sticky-nav-inner {
    max-width: 640px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 48px;
  }
  .sticky-nav .nav-brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--cream);
    text-decoration: none;
  }
  .sticky-nav .nav-brand span { color: var(--amber); }
  .sticky-nav .nav-links {
    display: flex;
    gap: 24px;
    list-style: none;
  }
  .sticky-nav .nav-links a {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .sticky-nav .nav-links a:hover { color: var(--amber); }

  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 0 0;
    position: relative;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    padding: 52px 40px 40px;
    border-bottom: 1px solid var(--line);
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.8s ease both;
  }
  header::after {
    content: '17';
    position: absolute;
    right: -10px;
    top: -30px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: min(260px, 42vw);
    line-height: 1;
    color: var(--surface2);
    letter-spacing: -8px;
    pointer-events: none;
    user-select: none;
  }
  .eyebrow {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .eyebrow::before {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--amber);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 15vw, 112px);
    line-height: 0.9;
    letter-spacing: 2px;
    color: var(--cream);
    position: relative;
    z-index: 1;
  }
  h1 span { color: var(--amber); }
  .tagline {
    font-size: 13px;
    color: var(--muted);
    margin-top: 20px;
    line-height: 1.5;
    max-width: 300px;
    position: relative;
    z-index: 1;
  }

  /* ── HERO IMAGE ── */
  .hero-image {
    width: 100%;
    aspect-ratio: 2 / 1;
    background: var(--surface);
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid var(--line);
    animation: fadeUp 0.8s 0.05s ease both;
  }
  .hero-image svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── LOCATION ── */
  .location-bar {
    margin: 28px 40px 0;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeUp 0.8s 0.1s ease both;
  }
  .location-bar .pin {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--amber);
    flex-shrink: 0;
  }
  .location-bar span {
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── INTRO ── */
  .intro {
    padding: 40px 40px 36px;
    border-bottom: 1px solid var(--line);
    animation: fadeUp 0.8s 0.15s ease both;
  }
  .intro p {
    font-size: 13px;
    line-height: 1.85;
    color: var(--cream);
    font-weight: 300;
    max-width: 540px;
  }
  .intro strong {
    color: var(--amber-light);
    font-weight: 500;
  }
  .access-detail {
    margin-top: 20px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .access-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .access-item .ico {
    color: var(--amber);
    font-size: 14px;
    flex-shrink: 0;
    opacity: 0.8;
  }

  /* ── PHOTO STRIP ── */
  .photo-strip {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--line);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .photo-placeholder {
    aspect-ratio: 4 / 3;
    background: var(--surface);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s;
  }
  .photo-placeholder:hover { background: var(--surface2); }
  .photo-placeholder .ph-icon {
    color: var(--line);
    transition: color 0.3s;
  }
  .photo-placeholder:hover .ph-icon { color: var(--muted); }
  .photo-placeholder .ph-label {
    position: absolute;
    bottom: 12px;
    left: 12px;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .photo-placeholder:hover .ph-label { opacity: 1; }

  /* ── SECTION LABELS ── */
  .section-label {
    padding: 32px 40px 16px;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--amber);
    font-weight: 500;
  }

  /* ── OFFER GRID ── */
  .offer-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--line);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .offer-card {
    background: var(--surface);
    padding: 28px 28px 24px;
    transition: background 0.25s;
  }
  .offer-card:hover { background: var(--surface2); }
  .offer-card .icon {
    font-size: 22px;
    margin-bottom: 14px;
    display: block;
    color: var(--amber);
    opacity: 0.9;
  }
  .offer-card h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--cream);
    margin-bottom: 8px;
  }
  .offer-card p {
    font-size: 11px;
    line-height: 1.7;
    color: var(--muted);
    font-weight: 300;
  }

  /* ── MACHINES ── */
  .machines-block { padding: 0 40px; }
  .machine-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding-bottom: 36px;
    border-bottom: 1px solid var(--line);
  }
  .machine-tag {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 12px;
    border: 1px solid var(--line);
    color: var(--muted);
    font-weight: 400;
    transition: all 0.25s;
    cursor: default;
  }
  .machine-tag:hover {
    border-color: var(--amber);
    color: var(--amber);
  }
  .machine-tag.highlight {
    border-color: var(--amber);
    color: var(--amber);
    background: var(--amber-glow);
  }

  /* ── FLOORPLAN ── */
  .floorplan-block {
    padding: 0 40px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 36px;
    position: relative;
  }
  .floorplan-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 16px;
  }
  .floorplan-tab {
    padding: 8px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--line);
    border-right: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  .floorplan-tab:last-child { border-right: 1px solid var(--line); }
  .floorplan-tab:hover { color: var(--cream); }
  .floorplan-tab.active {
    color: var(--amber);
    background: var(--amber-glow);
    border-color: var(--amber);
  }
  .floorplan-tab.active + .floorplan-tab { border-left-color: var(--amber); }
  .floorplan-svg {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    display: block;
  }
  .fp-obj { cursor: default; transition: opacity 0.2s; }
  .fp-obj.status-beschikbaar rect.fp-bg { filter: drop-shadow(0 0 6px rgba(76,175,80,0.4)); }
  .fp-obj.status-bezet { opacity: 0.45; }
  .fp-obj.status-gereserveerd rect.fp-bg { filter: drop-shadow(0 0 6px rgba(255,152,0,0.4)); }
  .fp-obj.huurunit { cursor: pointer; }
  .fp-obj.huurunit:hover { opacity: 1 !important; }
  .fp-tooltip {
    position: absolute;
    background: var(--surface);
    border: 1px solid var(--amber);
    padding: 10px 14px;
    font-size: 11px;
    color: var(--cream);
    pointer-events: none;
    z-index: 50;
    min-width: 140px;
    line-height: 1.6;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .fp-tooltip.visible { opacity: 1; }
  .fp-tooltip .tt-label { font-weight: 500; margin-bottom: 4px; }
  .fp-tooltip .tt-detail { font-size: 9px; color: var(--muted); letter-spacing: 0.05em; }
  .fp-tooltip .tt-status { font-size: 9px; text-transform: uppercase; letter-spacing: 0.15em; margin-top: 4px; }
  .fp-tooltip .tt-status.beschikbaar { color: #4CAF50; }
  .fp-tooltip .tt-status.bezet { color: #888; }
  .fp-tooltip .tt-status.gereserveerd { color: #FF9800; }
  .floorplan-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 16px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .legend-swatch {
    width: 12px; height: 12px;
    border: 1px solid var(--line);
  }

  /* ── PRICING ── */
  .pricing-block { padding: 0 40px; }
  .pricing-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
  }
  .pricing-row:last-child { border-bottom: none; }
  .pricing-row .label {
    font-size: 11px;
    color: var(--cream);
    font-weight: 400;
    letter-spacing: 0.05em;
  }
  .pricing-row .sub {
    font-size: 9px;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.1em;
  }
  .pricing-row .price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--amber);
    white-space: nowrap;
  }
  .pricing-row .price small {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-left: 4px;
    letter-spacing: 0.1em;
  }
  .pricing-note {
    font-size: 10px;
    color: var(--muted);
    padding: 10px 40px 0;
    letter-spacing: 0.04em;
    line-height: 1.6;
    font-weight: 300;
  }

  /* ── VOOR WIE ── */
  .for-who {
    margin: 0 40px;
    padding: 32px 0;
    border-bottom: 1px solid var(--line);
  }
  .criteria-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .criteria-list li {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    font-size: 11px;
    color: var(--cream);
    line-height: 1.6;
    font-weight: 300;
  }
  .criteria-list li .check {
    color: var(--amber);
    flex-shrink: 0;
    margin-top: 1px;
    font-size: 12px;
  }
  .not-for {
    margin-top: 16px;
    padding: 14px 16px;
    border-left: 2px solid var(--line);
    font-size: 10px;
    color: var(--muted);
    line-height: 1.7;
    letter-spacing: 0.04em;
  }
  .not-for strong {
    color: var(--cream);
    font-weight: 500;
  }

  /* ── CTA ── */
  .cta-block {
    padding: 40px 40px 0;
  }
  .cta-block h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    line-height: 1;
    letter-spacing: 1px;
    margin-bottom: 24px;
  }
  .cta-block h2 em {
    font-style: normal;
    color: var(--amber);
  }
  .cta-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--bg);
    background: var(--amber);
    border: none;
    cursor: pointer;
    transition: all 0.25s;
  }
  .btn-primary:hover {
    background: var(--amber-light);
    transform: translateY(-1px);
  }
  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--cream);
    background: transparent;
    border: 1px solid var(--line);
    cursor: pointer;
    transition: all 0.25s;
  }
  .btn-secondary:hover {
    border-color: var(--amber);
    color: var(--amber);
  }
  .cta-info {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .cta-line {
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 11px;
    color: var(--muted);
    font-weight: 300;
  }
  .cta-line .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--amber);
    flex-shrink: 0;
  }
  .cta-line a {
    color: var(--cream);
    text-decoration: none;
    border-bottom: 1px solid var(--line);
    transition: border-color 0.2s;
  }
  .cta-line a:hover { border-color: var(--amber); }

  /* ── INSTAGRAM ── */
  .insta-section {
    margin: 0 40px;
    padding: 32px 0 40px;
    border-bottom: 1px solid var(--line);
  }
  .insta-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 3px;
  }
  .insta-tile {
    aspect-ratio: 1;
    background: var(--surface);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s;
  }
  .insta-tile:hover { background: var(--surface2); }
  .insta-tile .insta-icon {
    color: var(--line);
    transition: color 0.3s;
  }
  .insta-tile:hover .insta-icon { color: var(--muted); }
  .insta-handle {
    margin-top: 14px;
    text-align: center;
  }
  .insta-handle a {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .insta-handle a:hover { color: var(--amber); }

  /* ── FOOTER ── */
  footer {
    margin: 0 40px;
    padding: 28px 0 60px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  footer .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--muted);
  }
  footer .brand span { color: var(--amber); }
  footer .footer-right {
    text-align: right;
  }
  footer .hashtags {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--muted);
    line-height: 1.8;
  }
  footer .copy {
    font-size: 9px;
    color: var(--line);
    margin-top: 8px;
    letter-spacing: 0.1em;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    header { padding: 40px 24px 32px; }
    .location-bar { margin: 20px 24px 0; }
    .intro { padding: 32px 24px 28px; }
    .section-label { padding: 28px 24px 14px; }
    .machines-block { padding: 0 24px; }
    .pricing-block { padding: 0 24px; }
    .pricing-note { padding: 10px 24px 0; }
    .for-who { margin: 0 24px; }
    .cta-block { padding: 32px 24px 0; }
    .insta-section { margin: 0 24px; }
    footer { margin: 0 24px; }
    .floorplan-block { padding: 0 24px; padding-bottom: 36px; }
    .offer-grid { grid-template-columns: 1fr; }
    .photo-strip { grid-template-columns: 1fr; }
    .insta-grid { grid-template-columns: repeat(2, 1fr); }
    .cta-actions { flex-direction: column; }
    .btn-primary, .btn-secondary { justify-content: center; }
    .sticky-nav .nav-links { gap: 14px; }
    .sticky-nav .nav-links a { font-size: 9px; letter-spacing: 0.12em; }
    .access-detail { gap: 12px; }
  }
</style>
</head>
<body>

<!-- STICKY NAV -->
<nav class="sticky-nav" id="stickyNav">
  <div class="sticky-nav-inner">
    <a href="#top" class="nav-brand">Werk<span>plaats</span>17</a>
    <ul class="nav-links">
      <li><a href="#aanbod">Aanbod</a></li>
      <li><a href="#indeling">Indeling</a></li>
      <li><a href="#tarieven">Tarieven</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </div>
</nav>

<div class="page" id="top">

  <!-- HEADER -->
  <header>
    <p class="eyebrow" id="c-eyebrow"></p>
    <h1>Werk<span>plaats</span></h1>
    <p class="tagline" id="c-tagline"></p>
  </header>

  <!-- HERO -->
  <div class="hero-image">
    <svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b17"/>
      <stop offset="100%" stop-color="#1a1714"/>
    </linearGradient>
    <linearGradient id="floorG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#211e18"/>
      <stop offset="100%" stop-color="#161412"/>
    </linearGradient>
    <linearGradient id="doorBeige" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E09A2F" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#E09A2F" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="glassG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E09A2F" stop-opacity="0.04"/>
      <stop offset="50%" stop-color="#161412" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#E09A2F" stop-opacity="0.03"/>
    </linearGradient>

    '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/></svg>',
    '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8V21H3V8"/><path d="M23 3H1v5h22V3z"/><line x1="10" y1="12" x2="14" y2="12"/></svg>',
    '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
  ];
  const offersEl = document.getElementById('c-offers');
  C.offers.forEach((o, i) => {
    offersEl.innerHTML += `<div class="offer-card"><span class="icon">${offerIcons[i] || ''}</span><h3>${o.title}</h3><p>${o.text}</p></div>`;
  });

  // Machines
  const machinesEl = document.getElementById('c-machines');
  C.machines.forEach(m => {
    machinesEl.innerHTML += `<span class="machine-tag${m.highlight ? ' highlight' : ''}">${m.name}</span>`;
  });

  // Pricing
  const pricingEl = document.getElementById('c-pricing');
  C.pricing.forEach(p => {
    pricingEl.innerHTML += `<div class="pricing-row"><div><div class="label">${p.label}</div><div class="sub">${p.sub}</div></div><div class="price">${p.price}<small>${p.unit}</small></div></div>`;
  });
  document.getElementById('c-pricing-note').textContent = C.pricingNote;

  // Target audience
  const audienceEl = document.getElementById('c-audience');
  C.targetAudience.forEach(item => {
    audienceEl.innerHTML += `<li><span class="check">✦</span> ${item}</li>`;
  });
  document.getElementById('c-not-for').innerHTML = C.notForText;

  // CTA
  document.getElementById('c-cta-heading').innerHTML = C.ctaHeading;
  const ctaActions = document.getElementById('c-cta-actions');
  ctaActions.innerHTML = `
    <a href="mailto:${C.email}" class="btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      Mail ons
    </a>
    <a href="https://wa.me/${C.whatsappNumber}?text=${encodeURIComponent(C.whatsappText)}" class="btn-secondary" target="_blank" rel="noopener">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      WhatsApp
    </a>`;

  const ctaInfo = document.getElementById('c-cta-info');
  C.contactLines.forEach(line => {
    ctaInfo.innerHTML += `<div class="cta-line"><div class="dot"></div><span>${line}</span></div>`;
  });
  ctaInfo.innerHTML += `<div class="cta-line"><div class="dot"></div><span>Rondleiding op afspraak — <a href="mailto:${C.email}">${C.email}</a></span></div>`;

  // Instagram
  document.getElementById('c-insta').innerHTML = `<a href="${C.instagramUrl}" target="_blank" rel="noopener">${C.instagramHandle}</a>`;

  // Footer
  document.getElementById('c-hashtags').innerHTML = C.hashtags;
  document.getElementById('c-copyright').textContent = C.copyright;

  // Sticky nav
  const nav = document.getElementById('stickyNav');
  const header = document.querySelector('header');
  const observer = new IntersectionObserver(([e]) => {
    nav.classList.toggle('visible', !e.isIntersecting);
  }, { threshold: 0 });
  observer.observe(header);
})();
</script>

<!-- FLOORPLAN RENDERER -->
<script>
(function() {
  if (typeof FLOORPLAN === 'undefined') return;
  var FP = FLOORPLAN;
  var svg = document.getElementById('floorplan-svg');
  var tabsEl = document.getElementById('floorplan-tabs');
  var legendEl = document.getElementById('floorplan-legend');
  var tooltip = document.getElementById('fp-tooltip');
  var activeFloor = 'all';
  var NS = 'http://www.w3.org/2000/svg';

  function el(tag, a, t) {
    var e = document.createElementNS(NS, tag);
    if (a) for (var k in a) { if (a.hasOwnProperty(k)) e.setAttribute(k, a[k]); }
    if (t !== undefined) e.textContent = t;
    return e;
  }
  function add(tag, a, t) { svg.appendChild(el(tag, a, t)); }
  function obj(id) { return FP.objects.find(function(o) { return o.id === id; }); }

  // Tabs
  FP.floors.forEach(function(f) {
    var btn = document.createElement('button');
    btn.className = 'floorplan-tab' + (f.id === activeFloor ? ' active' : '');
    btn.textContent = f.label;
    btn.dataset.floor = f.id;
    btn.addEventListener('click', function() {
      activeFloor = f.id;
      tabsEl.querySelectorAll('.floorplan-tab').forEach(function(t) {
        t.classList.toggle('active', t.dataset.floor === f.id);
      });
      render();
    });
    tabsEl.appendChild(btn);
  });

  // Legend
  FP.legend.forEach(function(l) {
    var d = document.createElement('div');
    d.className = 'legend-item';
    d.innerHTML = '<div class="legend-swatch" style="background:' + l.color + ';border-color:' + l.borderColor + ';"></div> ' + l.label;
    legendEl.appendChild(d);
  });

  // Status color for unit label
  function statusColor(s) {
    if (s === 'beschikbaar') return '#4CAF50';
    if (s === 'gereserveerd') return '#FF9800';
    if (s === 'bezet') return '#666';
    return '#7a7060';
  }

  function render() {
    svg.setAttribute('viewBox', '0 0 500 320');
    svg.innerHTML = '';
    var showE = activeFloor === 'all' || activeFloor === 'entresol';
    var showB = activeFloor === 'all' || activeFloor === 'bg';

    // ── Exact replica of original SVG structure ──

    // Outer wall
    add('rect', { x:20, y:20, width:460, height:260, fill:'none', stroke:'#3a3425', 'stroke-width':2, rx:2 });

    // ── ENTRESOL ──
    if (showE) {
      // Entresol background
      add('rect', { x:20, y:20, width:460, height:80, fill:'rgba(224,154,47,0.04)', stroke:'#3a3425', 'stroke-width':1 });
      add('text', { x:250, y:48, 'font-family':"'Bebas Neue', sans-serif", 'font-size':14, fill:'#E09A2F', 'text-anchor':'middle', 'letter-spacing':2 }, 'ENTRESOL');
      // Unit dividers
      add('line', { x1:135, y1:20, x2:135, y2:100, stroke:'#2e2920', 'stroke-width':0.5, 'stroke-dasharray':'4,4' });
      add('line', { x1:250, y1:20, x2:250, y2:100, stroke:'#2e2920', 'stroke-width':0.5, 'stroke-dasharray':'4,4' });
      add('line', { x1:365, y1:20, x2:365, y2:100, stroke:'#2e2920', 'stroke-width':0.5, 'stroke-dasharray':'4,4' });

      // Unit labels — data-driven from FLOORPLAN
      var units = [
        { id: 'unit-a', cx: 77 },
        { id: 'unit-b', cx: 192 },
        { id: 'unit-c', cx: 307 },
        { id: 'unit-d', cx: 422 }
      ];
      units.forEach(function(u) {
        var o = obj(u.id);
        if (!o) return;
        var g = el('g', { class: 'fp-obj huurunit', 'data-id': o.id });
        // Unit name
        g.appendChild(el('text', { x: u.cx, y: 72, 'font-family':"'DM Mono', monospace", 'font-size':7, fill:'#7a7060', 'text-anchor':'middle' }, o.label));
        // Area
        g.appendChild(el('text', { x: u.cx, y: 82, 'font-family':"'DM Mono', monospace", 'font-size':5.5, fill:'#2e2920', 'text-anchor':'middle' }, '~' + (o.area || 25) + ' m\u00B2'));
        // Status indicator — small colored dot + text
        if (o.status) {
          g.appendChild(el('circle', { cx: u.cx, cy: 90, r: 2.5, fill: statusColor(o.status) }));
        }
        // Tooltip
        g.addEventListener('mouseenter', function(e) {
          var h = '<div class="tt-label">' + o.label + '</div>';
          if (o.area) h += '<div class="tt-detail">~' + o.area + ' m\u00B2</div>';
          if (o.price) h += '<div class="tt-detail">' + o.price + '</div>';
          if (o.status) h += '<div class="tt-status ' + o.status + '">' + o.status + '</div>';
          tooltip.innerHTML = h;
          tooltip.classList.add('visible');
        });
        g.addEventListener('mousemove', function(e) {
          var cr = document.getElementById('floorplan-container').getBoundingClientRect();
          tooltip.style.left = (e.clientX - cr.left + 12) + 'px';
          tooltip.style.top = (e.clientY - cr.top - 10) + 'px';
        });
        g.addEventListener('mouseleave', function() { tooltip.classList.remove('visible'); });
        svg.appendChild(g);
      });
    }

    // Floor edge
    add('line', { x1:20, y1:100, x2:480, y2:100, stroke:'#3a3425', 'stroke-width':1.5 });
    add('text', { x:250, y:96, 'font-family':"'DM Mono', monospace", 'font-size':5, fill:'#3a3425', 'text-anchor':'middle', 'letter-spacing':'0.3em' }, 'VLOERRAND ENTRESOL');

    // ── WERKVLOER ──
    if (showB) {
      add('text', { x:250, y:130, 'font-family':"'Bebas Neue', sans-serif", 'font-size':14, fill:'#F0EAE0', 'text-anchor':'middle', 'letter-spacing':2, opacity:0.5 }, 'WERKVLOER');

      // Machinezone
      var mz = obj('machinezone');
      if (mz) {
        add('rect', { x:mz.x, y:mz.y, width:mz.width, height:mz.height, fill:'rgba(224,154,47,0.03)', stroke:'#2e2920', 'stroke-width':0.5, 'stroke-dasharray':'3,3', rx:2 });
        add('text', { x:130, y:162, 'font-family':"'DM Mono', monospace", 'font-size':7, fill:'#E09A2F', 'text-anchor':'middle', 'letter-spacing':'0.1em' }, 'MACHINEZONE');
      }

      // Machines
      ['fz','vd','lz','mz'].forEach(function(mid) {
        var m = obj(mid);
        if (!m) return;
        add('rect', { x:m.x, y:m.y, width:m.width, height:m.height, fill:'none', stroke:'#2e2920', 'stroke-width':0.5, rx:1 });
        add('text', { x: m.x + m.width/2, y: m.y + m.height/2 + 2, 'font-family':"'DM Mono', monospace", 'font-size':4.5, fill:'#7a7060', 'text-anchor':'middle' }, m.label);
      });

      // Machine legend
      add('text', { x:130, y:215, 'font-family':"'DM Mono', monospace", 'font-size':4.5, fill:'#2e2920', 'text-anchor':'middle' }, 'FZ=Formaatzaag VD=Vandiktebank');
      add('text', { x:130, y:222, 'font-family':"'DM Mono', monospace", 'font-size':4.5, fill:'#2e2920', 'text-anchor':'middle' }, 'LZ=Lintzaag MZ=Metaalzaag');

      // Flexspace
      var fs = obj('flexspace');
      if (fs) {
        add('rect', { x:fs.x, y:fs.y, width:fs.width, height:fs.height, fill:'rgba(240,234,224,0.02)', stroke:'#2e2920', 'stroke-width':0.5, 'stroke-dasharray':'3,3', rx:2 });
        add('text', { x: fs.x+fs.width/2, y:162, 'font-family':"'DM Mono', monospace", 'font-size':7, fill:'#7a7060', 'text-anchor':'middle', 'letter-spacing':'0.1em' }, 'FLEXSPACE');
        add('text', { x: fs.x+fs.width/2, y:195, 'font-family':"'DM Mono', monospace", 'font-size':6, fill:'#2e2920', 'text-anchor':'middle' }, 'Grote projecten');
        add('text', { x: fs.x+fs.width/2, y:205, 'font-family':"'DM Mono', monospace", 'font-size':6, fill:'#2e2920', 'text-anchor':'middle' }, 'op aanvraag');
      }

      // Opslag
      var op = obj('opslag');
      if (op) {
        add('rect', { x:op.x, y:op.y, width:op.width, height:op.height, fill:'rgba(224,154,47,0.03)', stroke:'#2e2920', 'stroke-width':0.5, rx:1 });
        add('text', { x: op.x+op.width/2, y:264, 'font-family':"'DM Mono', monospace", 'font-size':7, fill:'#7a7060', 'text-anchor':'middle' }, 'OPSLAG');
      }

      // Kantoor
      var kt = obj('kantoor');
      if (kt) {
        add('rect', { x:kt.x, y:kt.y, width:kt.width, height:kt.height, fill:'rgba(240,234,224,0.02)', stroke:'#2e2920', 'stroke-width':0.5, rx:1 });
        add('text', { x: kt.x+kt.width/2, y:264, 'font-family':"'DM Mono', monospace", 'font-size':7, fill:'#7a7060', 'text-anchor':'middle' }, 'KANTOOR');
      }

      // Bureau
      var bu = obj('bureau');
      if (bu) {
        add('rect', { x:bu.x, y:bu.y, width:bu.width, height:bu.height, fill:'rgba(240,234,224,0.02)', stroke:'#2e2920', 'stroke-width':0.5, rx:1 });
        add('text', { x: bu.x+bu.width/2, y:264, 'font-family':"'DM Mono', monospace", 'font-size':7, fill:'#7a7060', 'text-anchor':'middle' }, 'BUREAU');
      }

      // Deuren
      var d1 = obj('deur1');
      if (d1) {
        add('rect', { x:d1.x, y:d1.y, width:d1.width, height:d1.height, fill:'rgba(224,154,47,0.12)', stroke:'#E09A2F', 'stroke-width':0.5, 'stroke-opacity':0.4, rx:1 });
        add('text', { x: d1.x+d1.width/2, y:268, 'font-family':"'DM Mono', monospace", 'font-size':5, fill:'#E09A2F', 'text-anchor':'middle', opacity:0.6 }, 'DEUR 1');
      }
      var d2 = obj('deur2');
      if (d2) {
        add('rect', { x:d2.x, y:d2.y, width:d2.width, height:d2.height, fill:'rgba(224,154,47,0.12)', stroke:'#E09A2F', 'stroke-width':0.5, 'stroke-opacity':0.4, rx:1 });
        add('text', { x: d2.x+d2.width/2, y:268, 'font-family':"'DM Mono', monospace", 'font-size':5, fill:'#E09A2F', 'text-anchor':'middle', opacity:0.6 }, 'DEUR 2');
      }
    }

    // Compass
    add('text', { x:470, y:38, 'font-family':"'DM Mono', monospace", 'font-size':8, fill:'#3a3425' }, 'N \u2191');
  }

  render();
})();
</script>
